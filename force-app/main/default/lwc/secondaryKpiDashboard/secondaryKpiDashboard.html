<template>
    <lightning-card title="Secondary KPI Dashboard" icon-name="standard:dashboard">
        <lightning-button slot="actions" label="Refresh" icon-name="utility:refresh"
            onclick={handleRefresh}></lightning-button>

        <div class="slds-p-horizontal_small slds-p-bottom_medium kpi-root">

            <!-- Filters: user picker (managers only), period -->
            <div class="slds-grid slds-gutters_x-small slds-wrap slds-m-bottom_small">
                <template if:true={showPicker}>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-4">
                        <lightning-combobox label="DSM / SSA"
                            value={selectedUserId}
                            options={userOptions}
                            onchange={handleUserChange}
                            placeholder="Pick a DSM / SSA…"></lightning-combobox>
                    </div>
                </template>
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                    <lightning-input type="number" label="Year" value={year}
                        onchange={handleYear}></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                    <lightning-combobox label="Month" value={month}
                        options={monthOptions} onchange={handleMonth}></lightning-combobox>
                </div>
            </div>

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

            <!-- Empty state: manager has no DSM/SSA subordinates -->
            <template if:true={noSubordinates}>
                <div class="slds-p-around_large slds-text-align_center">
                    <lightning-icon icon-name="utility:info" alternative-text="Info"
                        size="medium" variant="warning"></lightning-icon>
                    <p class="slds-text-heading_small slds-m-top_small">No DSM / SSA users
                        in your reporting hierarchy</p>
                    <p class="slds-text-body_regular slds-text-color_weak">
                        Only DSM and SSA users carry secondary targets.
                        Ask your administrator to assign DSM / SSA users to your branch
                        of the role hierarchy.
                    </p>
                </div>
            </template>

            <template if:true={hasData}>
                <template if:false={noSubordinates}>
                    <!-- Who we're viewing -->
                    <div class="kpi-header slds-m-bottom_small">
                        <h2 class="slds-text-heading_medium">{data.selectedUserName}</h2>
                        <p class="slds-text-color_weak">{headerLine} · {data.periodLabel}</p>
                    </div>

                    <!-- Hero KPI tiles -->
                    <template if:true={hasHero}>
                        <div class="slds-grid slds-gutters_x-small slds-wrap kpi-tiles slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                <div class="kpi-tile">
                                    <div class="kpi-label">Active Targets</div>
                                    <div class="kpi-value">{hero.activeTargets}</div>
                                    <div class="kpi-sub">covering {data.periodLabel}</div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                <div class="kpi-tile kpi-tile_target">
                                    <div class="kpi-label">Total Target</div>
                                    <div class="kpi-value">{heroTotalTarget}</div>
                                    <div class="kpi-sub">sum across criteria</div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                <div class="kpi-tile kpi-tile_ach">
                                    <div class="kpi-label">Achievement</div>
                                    <div class="kpi-value">{heroTotalAchievement}</div>
                                    <div class="kpi-sub">
                                        <span class={heroPctClass}>{heroAchievementPct}</span> of target
                                    </div>
                                    <div class="kpi-progress">
                                        <div class="kpi-progress-fill" style={heroProgressStyle}></div>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                <div class="kpi-tile kpi-tile_incentive">
                                    <div class="kpi-label">PBIS Incentive</div>
                                    <div class="kpi-value">{heroTotalIncentive}</div>
                                    <div class="kpi-sub">{hero.incentiveLines} credit lines</div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Targets list -->
                    <div class="kpi-panel">
                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">
                            Active Secondary Targets
                        </h3>
                        <template if:true={hasTargets}>
                            <template if:true={isMobile}>
                                <template for:each={targets} for:item="t">
                                    <div key={t.targetId} class="kpi-card kpi-card_static">
                                        <div class="kpi-card-head">
                                            <div>
                                                <div class="kpi-card-title">{t.criterionName}</div>
                                                <div class="kpi-card-sub">
                                                    <template if:true={t.focusPackName}>
                                                        {t.focusPackName} ·
                                                    </template>
                                                    {t.targetName}
                                                    <template if:true={t.channel}>
                                                        · {t.channel}
                                                    </template>
                                                </div>
                                            </div>
                                            <span class={t.badgeClass}>{t.pctText}</span>
                                        </div>
                                        <div class="progress-track">
                                            <div class={t.barClass} style={t.barStyle}></div>
                                        </div>
                                        <div class="kpi-card-grid">
                                            <div>
                                                <div class="kpi-mini-label">Target</div>
                                                <div class="kpi-mini-value">{t.targetText}</div>
                                            </div>
                                            <div>
                                                <div class="kpi-mini-label">Achievement</div>
                                                <div class="kpi-mini-value">{t.achText}</div>
                                            </div>
                                            <div>
                                                <div class="kpi-mini-label">Pending</div>
                                                <div class="kpi-mini-value">{t.pendingText}</div>
                                            </div>
                                            <div>
                                                <div class="kpi-mini-label">Working Days</div>
                                                <div class="kpi-mini-value">{t.workingDays}</div>
                                            </div>
                                            <div>
                                                <div class="kpi-mini-label">Incentive</div>
                                                <div class="kpi-mini-value">{t.incentiveText}</div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </template>
                            <template if:false={isMobile}>
                                <lightning-datatable key-field="targetId"
                                    data={targets} columns={targetColumns}
                                    hide-checkbox-column></lightning-datatable>
                            </template>
                        </template>
                        <template if:false={hasTargets}>
                            <p class="slds-text-body_regular slds-text-color_weak slds-p-around_medium">
                                No active secondary targets for {data.selectedUserName} in {data.periodLabel}.
                            </p>
                        </template>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
