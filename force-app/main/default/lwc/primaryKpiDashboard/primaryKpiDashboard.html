<template>
    <div class="pkpi">
        <!-- Filter bar -->
        <div class="pkpi-filters">
            <div class="pkpi-filters-left">
                <lightning-input type="number" label="Year" value={year} onchange={handleYear}
                    class="pkpi-field" variant="label-inline"></lightning-input>
                <lightning-combobox label="Month" value={month} options={monthOptions}
                    onchange={handleMonth} class="pkpi-field" variant="label-inline"></lightning-combobox>
                <lightning-combobox label="Period" value={incentivePeriod} options={periodOptions}
                    onchange={handlePeriod} class="pkpi-field" variant="label-inline"></lightning-combobox>
                <template if:true={showPicker}>
                    <lightning-combobox label="User" value={viewUserId} options={pickerOptions}
                        onchange={handlePicker} class="pkpi-field pkpi-field_wide" variant="label-inline"></lightning-combobox>
                </template>
            </div>
            <lightning-button label="Refresh" icon-name="utility:refresh" onclick={handleRefresh}
                variant="brand-outline"></lightning-button>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </template>

        <!-- Empty -->
        <template if:true={isEmpty}>
            <div class="kpi-panel pkpi-empty">
                <lightning-icon icon-name="utility:moneybag" size="medium" class="pkpi-empty-icon"></lightning-icon>
                <p class="pkpi-empty-title">No Primary PBIS for this period</p>
                <p class="pkpi-empty-sub">Pick another period, or check that targets are loaded and recalculated.</p>
            </div>
        </template>

        <!-- Header + hero tiles -->
        <template if:true={hasHero}>
            <div class="kpi-header">
                <div>
                    <h2 class="kpi-h2">My Primary PBIS</h2>
                    <p class="kpi-header-sub">{heroSubHeading}</p>
                </div>
                <template if:true={isDrilled}>
                    <lightning-button label="Back to team" icon-name="utility:back"
                        onclick={handleBack} variant="neutral"></lightning-button>
                </template>
            </div>

            <div class="kpi-tiles">
                <div class="kpi-tile kpi-tile_incentive">
                    <p class="kpi-label">Total Incentive</p>
                    <p class="kpi-value">{heroTotalIncentive}</p>
                </div>
                <div class="kpi-tile kpi-tile_target">
                    <p class="kpi-label">Max Possible</p>
                    <p class="kpi-value">{heroMaxIncentive}</p>
                </div>
                <div class="kpi-tile kpi-tile_ach">
                    <p class="kpi-label">Achievement</p>
                    <p class={heroPctClass}>{heroPctText}</p>
                    <div class="kpi-progress">
                        <div class="kpi-progress-fill" style={heroProgressStyle}></div>
                    </div>
                </div>
                <div class="kpi-tile kpi-tile_elig">
                    <p class="kpi-label">Eligibility</p>
                    <span class={heroEligibleClass}>{heroEligibleText}</span>
                </div>
            </div>

            <!-- Per-parameter breakdown -->
            <div class="kpi-panel">
                <p class="kpi-panel-title">S &amp; D Parameter breakdown</p>
                <template if:true={hasParameters}>
                    <lightning-datatable key-field="id" data={parameters} columns={paramColumns}
                        hide-checkbox-column column-widths-mode="auto"></lightning-datatable>
                </template>
                <template if:false={hasParameters}>
                    <p class="pkpi-muted">No parameters on this target.</p>
                </template>
            </div>
        </template>

        <!-- Team table -->
        <template if:true={hasTeam}>
            <div class="kpi-panel">
                <p class="kpi-panel-title">My team</p>
                <lightning-datatable key-field="userId" data={teamRows} columns={teamColumns}
                    hide-checkbox-column onrowaction={handleRowAction} column-widths-mode="auto"></lightning-datatable>
            </div>
        </template>
    </div>
</template>
