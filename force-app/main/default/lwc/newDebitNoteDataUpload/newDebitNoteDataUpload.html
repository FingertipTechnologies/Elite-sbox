<template>
    <div class="upload-wrapper slds-p-around_medium">
        <div class="upload-header slds-grid slds-grid_align-spread slds-wrap">
            <h3 class="upload-title">Upload Secondary Debit Notes</h3>
            <div class="upload-actions">
                <button class="actionButton" onclick={handleSampleDownload}>Download Sample CSV</button>
                <button class="actionButton1" onclick={handleClose}>Close</button>
            </div>
        </div>

        <div class="upload-body slds-p-around_medium">
            <div class="slds-grid slds-wrap slds-gutters">
                <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                    <label class="slds-form-element__label">Select CSV File</label>
                    <input type="file" accept=".csv" onchange={handleFileChange} class="file-input" />
                    <template if:true={fileName}>
                        <p class="slds-text-body_small slds-m-top_x-small">Selected: {fileName} ({rowCount} rows)</p>
                    </template>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-p-around_small slds-text-align_right">
                    <button class="actionButton" disabled={uploadDisabled} onclick={handleUpload}>Upload</button>
                </div>
            </div>

            <template if:true={isUploading}>
                <div class="slds-p-around_medium slds-text-align_center">
                    <c-loading-screen></c-loading-screen>
                    <p class="slds-text-body_regular">Uploading records, please wait...</p>
                </div>
            </template>

            <template if:true={hasResult}>
                <div class="result-summary slds-box slds-m-top_medium">
                    <div class="slds-grid slds-gutters">
                        <div class="slds-col slds-size_1-of-3">
                            <p><strong>Total Records:</strong> {result.totalRecords}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-3 success-text">
                            <p><strong>Successful:</strong> {result.successCount}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-3 error-text">
                            <p><strong>Failed:</strong> {result.failedCount}</p>
                        </div>
                    </div>
                </div>

                <template if:true={hasErrors}>
                    <table class="contacts-table slds-m-top_medium">
                        <thead>
                            <tr>
                                <th style="width:10%;">Row #</th>
                                <th style="width:25%;">Customer Code</th>
                                <th style="width:65%;">Error Message</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={result.errors} for:item="err">
                                <tr key={err.rowNumber}>
                                    <td>{err.rowNumber}</td>
                                    <td>{err.customerCode}</td>
                                    <td class="error-text">{err.message}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>
            </template>
        </div>
    </div>
    <c-custom-toast auto-close-time="8000"></c-custom-toast>
</template>
