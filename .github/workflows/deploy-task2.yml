name: Deploy PBIS Task 2 (manifest)

# Manual, on-demand deploy of ONLY the Task 2 (PBIS Policy + Incentive Slab)
# metadata listed in manifest/pbis_task2.xml. Use this to bootstrap Task 2 into a
# sandbox where the change-only deploy left the objects out.
#
# Run it from the GitHub UI: Actions -> "Deploy PBIS Task 2 (manifest)" -> Run workflow.

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run PBISPolicy_ControllerTest during deploy'
        type: boolean
        default: false

jobs:
  deploy-task2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SALESFORCE_AUTH_URL }}" > authfile.txt
          sf org login sfdx-url --sfdx-url-file authfile.txt --alias deployment-org --set-default

      - name: Deploy Task 2 manifest
        run: |
          if [ "${{ inputs.run_tests }}" = "true" ]; then
            sf project deploy start \
              --manifest manifest/pbis_task2.xml \
              --target-org deployment-org \
              --test-level RunSpecifiedTests \
              --tests PBISPolicy_ControllerTest \
              --wait 30
          else
            sf project deploy start \
              --manifest manifest/pbis_task2.xml \
              --target-org deployment-org \
              --wait 30
          fi
